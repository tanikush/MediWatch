---
- name: MediWatch Server Setup
  hosts: mediwatch
  become: yes
  
  tasks:
    - name: Update system
      apt:
        update_cache: yes
    
    - name: Install Docker
      apt:
        name: docker.io
        state: present
    
    - name: Install Git
      apt:
        name: git
        state: present
    
    - name: Install Python
      apt:
        name: python3-pip
        state: present
    
    - name: Install Java (for Jenkins)
      apt:
        name: openjdk-17-jdk
        state: present
