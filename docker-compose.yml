version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  patient-service:
    build: ./services/patient-service
    ports:
      - '5001:5001'
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      - postgres

  lab-service:
    build: ./services/lab-service
    ports:
      - '5002:5002'
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      - postgres

  appointment-service:
    build: ./services/appointment-service
    ports:
      - '5003:5003'
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      - postgres

volumes:
  pgdata:
